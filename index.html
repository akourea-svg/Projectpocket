<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ProjectPocket 🌟</title>
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ProjectPocket">
<meta name="theme-color" content="#9775fa">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#9775fa;--yellow:#ffd43b;--green:#40c057;--red:#ff4757;--orange:#ff922b;--special:#2ec4b6;
  --text-dark:#1a1a2e;--text-mid:#888;
  --radius:20px;--radius-sm:12px;
  --shadow:0 4px 20px rgba(0,0,0,.1);--shadow-sm:0 2px 12px rgba(0,0,0,.06);
  --c-accent1:#9775fa;
}
html,body{min-height:100vh}
body{font-family:'Nunito',system-ui,sans-serif;font-style:normal;min-height:100vh;color:var(--text-dark);overflow-x:hidden;padding-bottom:90px;transition:background .4s ease}

/* ── PIN ── */
#pin-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#f0ecff 0%,#e8e0ff 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.pin-logo{font-size:4rem;margin-bottom:8px;line-height:1;filter:drop-shadow(0 4px 8px rgba(151,117,250,.3))}
.pin-title{font-family:'Fredoka One',Arial,sans-serif;font-size:2.4rem;color:var(--purple);margin-bottom:4px;line-height:1}
.pin-subtitle{font-size:.9rem;font-weight:600;color:var(--text-mid);margin-bottom:36px}
.pin-dots{display:flex;gap:16px;margin-bottom:32px}
.pin-dot{width:20px;height:20px;border-radius:50%;background:#e0d8f8;border:2px solid #c4b4f0;transition:all .2s}
.pin-dot.filled{background:var(--purple);border-color:var(--purple);transform:scale(1.1)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:290px}
.pin-key{background:#fff;border:none;border-radius:18px;padding:20px 10px;font-family:'Fredoka One',Arial,sans-serif;font-size:1.6rem;color:var(--text-dark);box-shadow:0 4px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent;user-select:none}
.pin-key:active{background:#ede5ff;transform:scale(.9);box-shadow:0 2px 6px rgba(0,0,0,.06)}
.pin-key.del{font-size:1.3rem;color:var(--text-mid)}
.pin-key.empty{background:transparent;box-shadow:none;cursor:default;pointer-events:none}
.pin-error{margin-top:18px;color:var(--red);font-weight:700;font-size:.9rem;min-height:22px;text-align:center}
.pin-hint{margin-top:12px;font-size:.75rem;color:#bbb;font-weight:600}

/* ── HEADER ── */

.app-header{padding:18px 20px 4px;text-align:center}
.app-title{font-family:'Fredoka One',Arial,sans-serif;font-size:2rem;background:linear-gradient(135deg,#9775fa,#f59f00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;letter-spacing:.5px;filter:drop-shadow(0 2px 4px rgba(151,117,250,.2))}
/* ── PARENT BAR ── */
.parent-bar{display:flex;justify-content:space-around;align-items:center;padding:10px 0 16px;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid rgba(0,0,0,.08);z-index:100;padding-bottom:calc(16px + env(safe-area-inset-bottom));transform:translateZ(0);-webkit-transform:translateZ(0)}
.parent-bar-btn{background:none;border:none;color:var(--text-mid);font-family:'Nunito',system-ui,sans-serif;font-size:.58rem;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 16px}
.parent-bar-btn.active{color:var(--purple)}.parent-bar-btn .nav-dot{width:4px;height:4px;border-radius:50%;background:transparent;margin:2px auto 0}.parent-bar-btn.active .nav-dot{background:var(--purple)}

/* ── TABS ── */
.child-tabs{display:flex;padding:16px 16px 0;gap:12px}
.child-tab{flex:1;background:#fff;border:none;border-radius:24px;padding:18px 8px 14px;cursor:pointer;transition:all .2s;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.child-tab.active{box-shadow:0 8px 24px rgba(0,0,0,.15);transform:translateY(-3px)}
.tab-avatar{font-size:3rem;display:block;line-height:1;transition:transform .3s cubic-bezier(.34,1.56,.64,1);margin-bottom:6px}
.tab-name{font-family:'Fredoka One',Arial,sans-serif;font-size:1.1rem;color:var(--text-mid);display:block}
.child-tab.active .tab-name{color:#fff}
.child-tab.active .tab-avatar{transform:scale(1.15)}

/* ── MAIN ── */
.main-content{padding:16px}

/* ── WEEK / THIS WEEK CARD ── */
.week-card{border-radius:24px;padding:20px;margin-bottom:16px;box-shadow:0 8px 30px rgba(0,0,0,.15);position:relative;overflow:hidden}
.week-card-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1}
.week-label{font-family:'Fredoka One',Arial,sans-serif;color:rgba(255,255,255,.8);font-size:.82rem}
.week-amount{font-family:'Fredoka One',Arial,sans-serif;font-size:3.2rem;color:#fff;line-height:1;text-shadow:0 3px 12px rgba(0,0,0,.2)}
.week-right{text-align:right}
.week-saved-label{font-size:.68rem;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.week-saved-val{font-family:'Fredoka One',Arial,sans-serif;font-size:1.5rem;color:#fff}
.week-bar-track{background:rgba(255,255,255,.2);border-radius:50px;height:8px;overflow:hidden}
.week-bar-fill{height:100%;border-radius:50px;background:rgba(255,255,255,.9);transition:width .6s ease}
.week-row-label{font-size:.72rem;font-weight:800;color:rgba(255,255,255,.75);margin-bottom:4px;margin-top:12px}
.week-bar-ends{display:flex;justify-content:space-between;margin-top:3px}
.week-bar-ends span{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.6)}

/* ── SAVINGS RING ── */
.jar-section{background:#fff;border-radius:24px;padding:20px 16px;margin-bottom:16px;box-shadow:var(--shadow-sm);text-align:center;display:flex;flex-direction:column;align-items:center}
.jar-title{font-family:'Fredoka One',Arial,sans-serif;font-size:1.1rem;color:var(--text-dark);margin-bottom:4px}
.jar-goal-label{font-size:.75rem;font-weight:700;color:var(--text-mid);margin-bottom:12px}
.jar-svg-wrap{position:relative;width:110px;height:140px}
.jar-save-btn{display:block;width:100%;background:var(--c-accent1,#9775fa);color:#fff;border:none;border-radius:16px;padding:15px;font-family:'Fredoka One',Arial,sans-serif;font-size:1.1rem;cursor:pointer;transition:all .15s;box-shadow:0 4px 12px rgba(0,0,0,.15);-webkit-tap-highlight-color:transparent}
.jar-save-btn:active{transform:translateY(2px);box-shadow:0 2px 6px rgba(0,0,0,.1)}
.jar-save-btn.armed{background:#e67700}

/* ── SECTION HEADING ── */
.section-heading{font-family:'Fredoka One',Arial,sans-serif;color:var(--text-dark);font-size:1.1rem;margin:16px 0 10px 2px;display:flex;align-items:center;gap:8px}

/* ── DAILY QUESTS ── */
.expected-section{background:#fff;border-radius:24px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.expected-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.expected-title{font-family:'Fredoka One',Arial,sans-serif;color:var(--text-dark);font-size:1.1rem}
.expected-badge{font-family:'Fredoka One',Arial,sans-serif;font-size:.78rem;background:var(--yellow);color:#664d03;border-radius:20px;padding:4px 12px}
.expected-subtitle{font-size:.76rem;color:var(--text-mid);font-weight:600;margin-bottom:12px}
.expected-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.expected-card{background:#fafafa;border-radius:14px;padding:11px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;border:2px solid transparent;text-align:center}
.expected-card:active{transform:scale(.95)}
.expected-card.done{background:#f0faf3;border-color:#c8f0d4}
.expected-emoji{font-size:1.6rem}
.expected-name{font-weight:700;color:var(--text-dark);font-size:.68rem;line-height:1.2}
.expected-card.done .expected-name{text-decoration:line-through;color:var(--text-mid)}
.expected-check{width:22px;height:22px;border-radius:50%;border:2.5px solid #dee2e6;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:transparent;transition:all .2s;background:#fff}
.expected-card.done .expected-check{background:var(--green);border-color:var(--green);color:#fff}

/* ── SPECIAL QUESTS ── */
.chores-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chore-card{background:#fafafa;border-radius:14px;padding:11px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:all .15s;border:2px solid transparent;text-align:center;box-shadow:none}
.chore-card.done{background:#f0faf3;border-color:#b8ecc8}
.chore-card.done-locked{opacity:.35;cursor:default}
.chore-card:not(.done-locked):active{transform:scale(.95)}
.chore-emoji{font-size:1.6rem;line-height:1}
.chore-info{width:100%}
.chore-name{font-weight:700;font-size:.68rem;color:var(--text-dark);line-height:1.2;text-align:center}
.chore-card.done .chore-name{text-decoration:line-through;color:#aaa}
.chore-checkbox{width:22px;height:22px;border-radius:50%;border:2.5px solid #dee2e6;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .2s;background:#fff;color:transparent}
.chore-card.done .chore-checkbox{background:var(--green);border-color:var(--green);color:#fff}
.chore-edit-btns{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:10px;border:none;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.icon-btn:active{transform:scale(.85)}
.btn-edit{background:#e7f5ff}
.btn-del{background:#fff0f0}

/* ── PARENT CONTROLS ── */
.deduction-section{background:linear-gradient(135deg,#fff8e1,#fff3cd);border-radius:20px;padding:16px 18px;margin-top:16px;box-shadow:var(--shadow-sm)}
.deduction-label{font-family:'Fredoka One',Arial,sans-serif;color:#664d03;font-size:1rem;margin-bottom:2px}
.deduction-sub{font-size:.75rem;font-weight:700;color:#997404;margin-bottom:12px}
.deduction-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.deduction-btn{display:flex;align-items:center;gap:8px;border:none;border-radius:14px;padding:13px 20px;cursor:pointer;transition:transform .12s,box-shadow .12s,filter .12s;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 0 rgba(0,0,0,.15)}
.deduction-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.15);filter:brightness(.9)}
.deduction-btn:disabled{opacity:.3;cursor:default}
.deduction-btn-icon{font-size:1.5rem;font-weight:900;color:#fff;line-height:1}
.deduction-btn-label{font-family:'Fredoka One',Arial,sans-serif;font-size:1rem;color:#fff}

/* ── PARENT PANEL ── */
.parent-panel{background:#fff;border-radius:20px;padding:18px;margin-top:16px;box-shadow:var(--shadow-sm)}
.parent-panel h3{font-family:'Fredoka One',Arial,sans-serif;color:var(--text-dark);font-size:1rem;margin-bottom:14px}
.panel-section{background:#f8f8fc;border-radius:14px;padding:12px 14px;margin-bottom:10px}
.panel-label{color:var(--text-dark);font-size:.88rem;font-weight:700;margin-bottom:8px}
.btn-action{width:100%;padding:13px;border:none;border-radius:14px;font-family:'Fredoka One',Arial,sans-serif;font-size:1rem;cursor:pointer;margin-bottom:8px;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.btn-action:active{opacity:.8}
.btn-reset{background:#f0f0f5;color:var(--text-mid)}
.btn-danger{background:#fff0f0;color:var(--red)}
.goal-edit-row{display:flex;gap:8px}
.form-input{background:#f8f8fc;border:2px solid #eee;border-radius:12px;padding:10px 12px;font-family:'Nunito',system-ui,sans-serif;font-size:16px;font-weight:700;color:var(--text-dark);width:100%;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--purple);background:#fff}
.btn-save{background:var(--purple);color:#fff;border:none;border-radius:12px;padding:10px 18px;font-family:'Fredoka One',Arial,sans-serif;font-size:.9rem;cursor:pointer;white-space:nowrap;box-shadow:0 4px 10px rgba(151,117,250,.3)}
.add-chore-section{background:#f8f8fc;border-radius:20px;padding:16px;margin-top:12px}
.add-chore-section h4{font-family:'Fredoka One',Arial,sans-serif;color:var(--text-dark);font-size:.95rem;margin-bottom:10px}
.btn-primary{display:block;width:100%;background:var(--purple);color:#fff;border:none;border-radius:14px;padding:13px;font-family:'Fredoka One',Arial,sans-serif;font-size:1rem;cursor:pointer;box-shadow:0 4px 12px rgba(151,117,250,.3)}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;padding:16px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:#fff;border-radius:26px;padding:24px;width:100%;max-width:440px;transform:translateY(40px);transition:transform .28s cubic-bezier(.34,1.3,.64,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-title{font-family:'Fredoka One',Arial,sans-serif;font-size:1.4rem;color:var(--text-dark);margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-weight:700;font-size:.82rem;color:var(--text-mid);margin-bottom:4px}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn-secondary{flex:1;background:#f0f0f5;color:var(--text-dark);border:none;border-radius:14px;padding:13px;font-family:'Fredoka One',Arial,sans-serif;font-size:.95rem;cursor:pointer}
.modal-actions .btn-primary{flex:2}

/* ── STREAK ── */
.streak-section{background:#fff;border-radius:24px;padding:16px 18px;margin-top:16px;box-shadow:var(--shadow-sm);background:linear-gradient(135deg,#fff8f0,#fff3e8)}
.streak-inner{display:flex;align-items:center;gap:14px}
.streak-flame{font-size:3.2rem;line-height:1;filter:drop-shadow(0 2px 8px rgba(255,146,43,.5));animation:flamePulse 2s ease-in-out infinite}
.streak-count{font-family:'Fredoka One',Arial,sans-serif;font-size:2.2rem;color:#e67700;line-height:1}
.streak-label{font-size:.76rem;font-weight:700;color:#997404;margin-top:3px}

/* ── CHART ── */
.chart-section{background:#fff;border-radius:24px;padding:16px 18px;margin-top:16px;box-shadow:var(--shadow-sm)}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.chart-title{font-family:'Fredoka One',Arial,sans-serif;font-size:1rem;color:var(--text-dark)}
.chart-sub{font-size:.75rem;font-weight:600;color:var(--text-mid)}

/* ── MISC ── */
.week-notice{text-align:center;color:var(--text-mid);font-size:.72rem;font-weight:600;margin-top:12px}
.jar-amounts{text-align:left}
.jar-saved{font-family:'Fredoka One',Arial,sans-serif;font-size:2rem;color:var(--c-accent1,#9775fa);line-height:1}
.jar-target{font-size:.8rem;font-weight:700;color:var(--text-mid);margin-top:2px}
.jar-pct{font-family:'Fredoka One',Arial,sans-serif;font-size:1rem;color:var(--text-mid);margin-top:4px}
.jar-wrap{display:flex;align-items:flex-end;justify-content:center;gap:20px;margin-bottom:16px}

#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:9995;width:100%;height:100%}
.coin-drop{position:fixed;pointer-events:none;z-index:500;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffe566,#f59f00 55%,#c87800);box-shadow:0 2px 5px rgba(0,0,0,.2);animation:coinRain var(--dur,1.2s) linear forwards}
.coin-particle{position:fixed;pointer-events:none;z-index:200;width:24px;height:24px;display:flex;align-items:center;justify-content:center;animation:coin-fly .85s ease-out forwards;transform-origin:center}
@keyframes coinRain{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes coin-fly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(.1);opacity:0}}
@keyframes flamePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes avatarBounce{0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(.9)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes jarShake{0%,100%{transform:translateX(0) rotate(0)}15%{transform:translateX(-6px) rotate(-3deg)}30%{transform:translateX(6px) rotate(3deg)}45%{transform:translateX(-4px) rotate(-2deg)}60%{transform:translateX(4px) rotate(2deg)}75%{transform:translateX(-2px) rotate(-1deg)}}
.jar-fill-ripple{position:absolute;bottom:0;left:0;right:0;height:8px;background:rgba(255,255,255,.4);border-radius:50%;animation:ripple .8s ease-out forwards}
@keyframes miniBurstAnim{0%{transform:translate(0,0) rotate(0deg);opacity:1}100%{transform:translate(var(--tx),var(--ty)) rotate(var(--rot));opacity:0}}
@keyframes ripple{0%{transform:scaleX(1.15) scaleY(.85);opacity:.7}50%{transform:scaleX(.92) scaleY(1.08);opacity:.5}100%{transform:scaleX(1) scaleY(1);opacity:0}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div id="pin-screen">
  <div class="pin-logo">🌟</div>
  <div class="pin-title">ProjectPocket</div>
  <div class="pin-subtitle">Enter your PIN to continue</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-error" id="pinError"></div>
  <div class="pin-hint" id="pinHint"></div>
</div>

<div id="app" style="display:none">
  <div class="app-header"><div class="app-title">🌟 ProjectPocket</div></div>
  <div class="child-tabs" id="childTabs"></div>
  <div class="main-content" id="mainContent"></div>
  <div id="parentControls" style="display:none;padding:0 14px 14px"></div>
  <div id="historyPanel" style="display:none;padding:14px"></div>
</div>

<div class="parent-bar" id="parentBar">
  <button class="parent-bar-btn active" id="homeTabBtn"><span style="font-size:1.3rem">🏠</span>Home<div class="nav-dot"></div></button>
  <button class="parent-bar-btn" id="historyTabBtn"><span style="font-size:1.3rem">📊</span>History<div class="nav-dot"></div></button>
  <button class="parent-bar-btn" id="editToggleBtn"><span style="font-size:1.3rem">⚙️</span>Parent<div class="nav-dot"></div></button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-title">✏️ Edit Special Quest</div>
    <div class="modal-field"><label>Emoji</label><input class="form-input" id="modalEmoji" maxlength="4"></div>
    <div class="modal-field"><label>Name</label><input class="form-input" id="modalName"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="modalCancelBtn">Cancel</button>
      <button class="btn-primary" id="modalSaveBtn">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="expModalOverlay">
  <div class="modal-sheet">
    <div class="modal-title">✏️ Edit Daily Quest</div>
    <div class="modal-field"><label>Emoji</label><input class="form-input" id="expModalEmoji" maxlength="4"></div>
    <div class="modal-field"><label>Name</label><input class="form-input" id="expModalName"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="expModalCancelBtn">Cancel</button>
      <button class="btn-primary" id="expModalSaveBtn">Save</button>
    </div>
  </div>
</div>

// Get ISO week key e.g. '2026-W25'
function isoWeek(dateStr) {
  var d = new Date(dateStr + 'T12:00:00');
  // Thursday in current week determines year
  var thursday = new Date(d);
  thursday.setDate(d.getDate() - ((d.getDay()+6)%7) + 3);
  var firstThursday = new Date(thursday.getFullYear(),0,4);
  firstThursday.setDate(firstThursday.getDate() - ((firstThursday.getDay()+6)%7) + 3);
  var week = Math.round((thursday - firstThursday) / 604800000) + 1;
  return thursday.getFullYear() + '-W' + (week < 10 ? '0'+week : week);
}

function logPastActivity(ch, dateStr, dailyCount, specialCount) {
  if (!dateStr || (!dailyCount && !specialCount)) { showMsg('Enter a date and at least one count', '#e03131'); return; }
  var wk = isoWeek(dateStr);
  if (!ch.weeklyLog) ch.weeklyLog = {};
  if (!ch.weeklyLog[wk]) ch.weeklyLog[wk] = {daily:0, special:0, days:0, daysSeen:{}, dayCounts:{}};
  var entry = ch.weeklyLog[wk];
  if (!entry.dayCounts) entry.dayCounts = {};
  if (!entry.daysSeen) entry.daysSeen = {};

  var prev = entry.dayCounts[dateStr] || {daily:0, special:0};
  var newDaily   = Math.max(0, parseInt(dailyCount)   || 0);
  var newSpecial = Math.max(0, parseInt(specialCount) || 0);

  // Update totals by removing old and adding new
  entry.daily   = Math.max(0, (entry.daily||0)   - prev.daily   + newDaily);
  entry.special = Math.max(0, (entry.special||0) - prev.special + newSpecial);
  entry.totalChores = (entry.totalChores||0) - (prev.daily + prev.special) + (newDaily + newSpecial);

  // Update totalChores on child
  ch.totalChores = Math.max(0, (ch.totalChores||0) - (prev.daily + prev.special) + (newDaily + newSpecial));

  if (newDaily > 0 || newSpecial > 0) {
    entry.dayCounts[dateStr] = {daily:newDaily, special:newSpecial};
    entry.daysSeen[dateStr] = true;
  } else {
    delete entry.dayCounts[dateStr];
    delete entry.daysSeen[dateStr];
  }
  entry.days = Object.keys(entry.daysSeen).length;
  save(); render();
  showMsg('Activity logged for '+dateStr, '#2f9e44');
}

function checkBadges(ch, allChildren) {
  if (!ch.badges) ch.badges = {};
  if (!allChildren) allChildren = state.children;
  if (typeof ch.totalChores !== 'number') ch.totalChores = 0;
  var newBadges = [];
  var streak = calcStreak(ch);
  var savedPct = ch.goalTarget > 0 ? ((ch.goalSaved||0) / ch.goalTarget * 100) : 0;

  // Streak badges
  if (streak >= 3  && !ch.badges.streak3)  { ch.badges.streak3  = true; newBadges.push('streak3'); }
  if (streak >= 7  && !ch.badges.streak7)  { ch.badges.streak7  = true; newBadges.push('streak7'); }
  if (streak >= 14 && !ch.badges.streak14) { ch.badges.streak14 = true; newBadges.push('streak14'); }
  if (streak >= 30 && !ch.badges.streak30) { ch.badges.streak30 = true; newBadges.push('streak30'); }

  // Special quests this week
  var wk = isoWeek(todayStr());
  var weekEntry = ch.weeklyLog && ch.weeklyLog[wk];
  if (weekEntry && (weekEntry.special || 0) >= 3 && !ch.badges.special3) {
    ch.badges.special3 = true; newBadges.push('special3');
  }

  // Savings progress badges — fire on goalSaved progress, accumulate forever
  if (savedPct >= 25  && !ch.badges.save25)  { ch.badges.save25  = true; newBadges.push('save25'); }
  if (savedPct >= 50  && !ch.badges.save50)  { ch.badges.save50  = true; newBadges.push('save50'); }
  if (savedPct >= 75  && !ch.badges.save75)  { ch.badges.save75  = true; newBadges.push('save75'); }
  // save100 and firstsave only when Bank It is pressed (handled in showJarFullCelebration)
  // bonus1 is awarded in addBonus() directly, not here passively

  // Total chores
  if ((ch.totalChores||0) >= 50  && !ch.badges.chores50)  { ch.badges.chores50  = true; newBadges.push('chores50'); }
  if ((ch.totalChores||0) >= 100 && !ch.badges.chores100) { ch.badges.chores100 = true; newBadges.push('chores100'); }

  // Teamwork — both children did a special quest on the same day
  if (!ch.badges.teamwork && allChildren && allChildren.length >= 2) {
    // Build set of days this child did a special quest
    var mySpecialDays = {};
    Object.keys(ch.weeklyLog||{}).forEach(function(wk) {
      var dc = ch.weeklyLog[wk].dayCounts || {};
      Object.keys(dc).forEach(function(d) { if (dc[d].special > 0) mySpecialDays[d] = true; });
    });
    // Check if any other child shares a special quest day
    var otherChildren = allChildren.filter(function(x){return x.id !== ch.id;});
    var teamworkFound = otherChildren.some(function(other) {
      return Object.keys(other.weeklyLog||{}).some(function(wk) {
        var dc = (other.weeklyLog[wk].dayCounts) || {};
        return Object.keys(dc).some(function(d) { return dc[d].special > 0 && mySpecialDays[d]; });
      });
    });
    if (teamworkFound) { ch.badges.teamwork = true; newBadges.push('teamwork'); }
  }

  return newBadges;
}

function recordWeeklyActivity(ch, type) {
  var wk = isoWeek(todayStr());
  if (!ch.weeklyLog) ch.weeklyLog = {};
  if (!ch.weeklyLog[wk]) ch.weeklyLog[wk] = {daily:0, special:0, days:0, daysSeen:{}, dayCounts:{}};
  var entry = ch.weeklyLog[wk];
  var td = todayStr();
  if (!entry.daysSeen) entry.daysSeen = {};
  if (!entry.dayCounts) entry.dayCounts = {};
  if (!entry.daysSeen[td]) {
    entry.daysSeen[td] = true;
    entry.days = Object.keys(entry.daysSeen).length;
  }
  // Track per-day counts: dayCounts[date] = {daily:N, special:N}
  if (!entry.dayCounts[td]) entry.dayCounts[td] = {daily:0, special:0};
  if (type === 'daily')   { entry.daily++; entry.dayCounts[td].daily++; }
  if (type === 'special') { entry.special++; entry.dayCounts[td].special++; }
}

function seedWeeklyLog(s) {
  if (!s || !s.children) return s;
  s.children.forEach(function(ch) {
    if (!ch) return;
    if (!ch.weeklyLog) ch.weeklyLog = {};

    // Seed W24 only if not already set (don't overwrite real data)
    if (!ch.weeklyLog['2026-W24'] || !ch.weeklyLog['2026-W24'].daysSeen) {
      ch.weeklyLog['2026-W24'] = {daily:2, special:1, days:2, daysSeen:{'2026-06-13':true,'2026-06-14':true}, dayCounts:{'2026-06-13':{daily:3,special:1},'2026-06-14':{daily:4,special:0}}};
    }

    // Seed W25 — merge in the known historical days, don't overwrite days already recorded
    if (!ch.weeklyLog['2026-W25']) ch.weeklyLog['2026-W25'] = {daily:0, special:0, days:0, daysSeen:{}, dayCounts:{}};
    var w25 = ch.weeklyLog['2026-W25'];
    if (!w25.daysSeen) w25.daysSeen = {};
    if (!w25.dayCounts) w25.dayCounts = {};

    // Seed each historical day only if not already present
    var historicalDays = {
      '2026-06-15': {daily:2, special:0},
      '2026-06-16': {daily:2, special:1},
      '2026-06-17': {daily:2, special:0},
      '2026-06-18': {daily:2, special:0},
      '2026-06-21': {daily:2, special:1}
    };
    Object.keys(historicalDays).forEach(function(d) {
      if (!w25.daysSeen[d]) {
        var dc = historicalDays[d];
        w25.daysSeen[d] = true;
        w25.dayCounts[d] = dc;
        w25.daily   = (w25.daily||0)   + dc.daily;
        w25.special = (w25.special||0) + dc.special;
      }
    });
    w25.days = Object.keys(w25.daysSeen).length;

    delete ch.activityLog;
  });
  return s;
}

// Streak: count consecutive days with any activity using daysSeen across all weeks
function calcStreak(ch) {
  if (typeof ch.manualStreak === 'number') return ch.manualStreak;
  if (!ch.weeklyLog) return 0;

  function localDateStr(d) {
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  // Build set of all active days from daysSeen
  var activeDays = {};
  Object.keys(ch.weeklyLog).forEach(function(wk) {
    var entry = ch.weeklyLog[wk];
    if (entry && entry.daysSeen) {
      Object.keys(entry.daysSeen).forEach(function(d) { activeDays[d] = true; });
    }
  });

  var now = new Date();
  var today = localDateStr(now);
  var yest = new Date(now); yest.setDate(now.getDate()-1);
  var yesterday = localDateStr(yest);

  // Streak must be anchored to today or yesterday
  var startDate = activeDays[today] ? today : activeDays[yesterday] ? yesterday : null;
  if (!startDate) return 0;

  // Count consecutive days back using local dates only
  var streak = 0;
  var d = new Date(startDate + 'T12:00:00');
  while (streak < 365) {
    var key = localDateStr(d);
    if (!activeDays[key]) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

  var todayKey = todayStr();
  var DAILY_TOTAL = (ch.expectedTasks || []).length || 7;
  var SPECIAL_TOTAL = (ch.earningChores || []).length || 5;

  // Get Sunday of this display week
  var sun = new Date(today);
  sun.setDate(today.getDate() - today.getDay());

  // Merge dayCounts from all weeks
  var dayCounts = {};
  Object.keys(ch.weeklyLog).forEach(function(wk) {
    var entry = ch.weeklyLog[wk];
    if (entry && entry.dayCounts) {
      Object.keys(entry.dayCounts).forEach(function(d) {
        dayCounts[d] = entry.dayCounts[d];
      });
    }
    // Fallback: if daysSeen but no dayCounts, mark as partial
    if (entry && entry.daysSeen && !entry.dayCounts) {
      Object.keys(entry.daysSeen).forEach(function(d) {
        if (!dayCounts[d]) dayCounts[d] = {daily:1, special:0};

    html += '<div style="text-align:center">' +

        // Daily fill from bottom

      '</div>' +
      '<div style="font-size:.52rem;color:var(--text-mid);margin-top:2px">' + d.getDate() + '</div>' +
      '</div>';
  }
  html += '</div>';

  // Legend
  html += '<div style="display:flex;gap:12px;margin-top:8px;justify-content:center">' +
    '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:3px;background:'+accent+'"></div><span style="font-size:.68rem;font-weight:700;color:var(--text-mid)">Daily</span></div>' +

function startWaveAnimation(accent) {
  var canvas = document.getElementById('waveCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = 60, H = 20;
  canvas.width = W; canvas.height = H;

  // Parse accent colour to rgb
  var tmp = document.createElement('div');
  tmp.style.color = accent;
  document.body.appendChild(tmp);
  var rgb = window.getComputedStyle(tmp).color;
  document.body.removeChild(tmp);
  var m = rgb.match(/\d+/g) || ['151','117','250'];
  var r = m[0], g = m[1], b = m[2];

  var waves = [
    { amp: 5, freq: 0.18, phase: 0,    speed: 0.08 },
    { amp: 3, freq: 0.28, phase: 1.2,  speed: -0.06 },
    { amp: 2, freq: 0.42, phase: 2.4,  speed: 0.11 }
  ];
  var startTime = Date.now();
  var duration = 2200;
  var animId;

  function draw() {
    var elapsed = Date.now() - startTime;
    var progress = Math.min(elapsed / duration, 1);
    // Ease out — waves calm down over time
    var decay = 1 - Math.pow(progress, 0.6);

    ctx.clearRect(0, 0, W, H);

    // Draw wave surface
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (var x = 0; x <= W; x++) {
      var y = H / 2;
      waves.forEach(function(w) {
        y += Math.sin(x * w.freq + w.phase + elapsed * w.speed * 0.1) * w.amp * decay;
      });
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = 'rgba('+r+','+g+','+b+',0.55)';
    ctx.fill();

    // Highlight shimmer on wave top
    ctx.beginPath();
    for (var x2 = 0; x2 <= W; x2++) {
      var y2 = H / 2;
      waves.forEach(function(w) {
        y2 += Math.sin(x2 * w.freq + w.phase + elapsed * w.speed * 0.1) * w.amp * decay;
      });
      if (x2 === 0) ctx.moveTo(x2, y2);
      else ctx.lineTo(x2, y2 - 1.5);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    if (progress < 1) {
      animId = requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, W, H);
    }
  }

  if (animId) cancelAnimationFrame(animId);
  draw();
}

              }, w*180);

function switchChild(i) {
  activeIdx = i;
  document.documentElement.style.setProperty('--child-bg', COLORS[i].bg);
  document.body.style.background = COLORS[i].bg;
  // Re-render the correct panel for whichever tab is active
  if (activeTab === 'parent') {
    renderTabs();
    var pc = document.getElementById('parentControls');
    var mc = document.getElementById('mainContent');
    if (mc) mc.style.display = 'none';
    if (pc) { pc.style.display = 'block'; renderParentOnly(); }
  } else if (activeTab === 'history') {
    renderTabs();
    renderHistory();
  } else {
    render();
  }
  // Bounce the active avatar
  var tabs = document.querySelectorAll('.child-tab');
  if (tabs[i]) {
    var av = tabs[i].querySelector('.tab-avatar');
    if (av) {
      av.style.animation = 'none';
      void av.offsetHeight;
      av.style.animation = 'avatarBounce 0.5s cubic-bezier(.34,1.56,.64,1)';
    }
  }
}

// Tab state
var activeTab = 'home';

function switchTab(tab) {
  activeTab = tab;
  // Blur any focused input to prevent iOS zoom persisting between tabs
  if (document.activeElement) document.activeElement.blur();
  window.scrollTo(0, 0);
  var mc = document.getElementById('mainContent');
  var pc = document.getElementById('parentControls');
  var hp = document.getElementById('historyPanel');
  var homeBtn = document.getElementById('homeTabBtn');
  var histBtn = document.getElementById('historyTabBtn');
  var parentBtn = document.getElementById('editToggleBtn');

  // Reset all
  [homeBtn, histBtn, parentBtn].forEach(function(b) { if(b) b.classList.remove('active'); });

  if (tab === 'home') {
    if(mc) mc.style.display = '';
    if(pc) { pc.style.display = 'none'; pc.innerHTML = ''; }
    if(hp) hp.style.display = 'none';
    if(homeBtn) homeBtn.classList.add('active');
    editMode = false;
    render();
  } else if (tab === 'history') {
    if(mc) mc.style.display = 'none';
    if(pc) { pc.style.display = 'none'; pc.innerHTML = ''; }
    if(hp) { hp.style.display = 'block'; renderHistory(); }
    if(histBtn) histBtn.classList.add('active');
    editMode = false;
  } else if (tab === 'parent') {
    if(mc) mc.style.display = 'none';
    if(hp) hp.style.display = 'none';
    if(pc) pc.style.display = 'block';
    if(parentBtn) parentBtn.classList.add('active');
    editMode = true;
    renderParentOnly();
  }
}

function toggleChore(childId, choreId, e) {
  var ch    = state.children.find(function(c){return c.id===childId;});
  var chore = (ch.earningChores||[]).find(function(c){return c.id===choreId;});
  if (!chore) return;
  var td = todayStr();
  if (!chore.done || chore.lastDone !== td) {
    chore.done=true; chore.lastDone=td;
    ch.totalChores = (ch.totalChores||0) + 1;
    recordActivity(ch, 'special');
    var col2 = COLORS[activeIdx]; miniBurst((e&&e.clientX)||innerWidth/2, (e&&e.clientY)||innerHeight/2, col2?col2.accent1:'#9775fa');
    var nb1 = checkBadges(ch, state.children); if (nb1.length) { setTimeout(function(){queueBadge(nb1[0]);},600); }
    save(); playTick(); render();
  } else {
    chore.done=false; chore.lastDone='';
    // Decrement weekly log counts for today
    var wkU = isoWeek(todayStr());
    var entryU = ch.weeklyLog && ch.weeklyLog[wkU];
    if (entryU) {
      if (entryU.special > 0) entryU.special--;
      var tdU = todayStr();
      if (entryU.dayCounts && entryU.dayCounts[tdU] && entryU.dayCounts[tdU].special > 0) {
        entryU.dayCounts[tdU].special--;
      }
      // If no activity left today, remove from daysSeen
      if (entryU.dayCounts && entryU.dayCounts[tdU]) {
        var dc = entryU.dayCounts[tdU];
        if (dc.daily === 0 && dc.special === 0) {
          delete entryU.daysSeen[tdU];
          delete entryU.dayCounts[tdU];
          entryU.days = Object.keys(entryU.daysSeen).length;
        }
      }
    }
    save(); render();
  }
}

function doBankNow(ch) {
  var amount = ch.goalSaved || 0;
  var fromSaved = amount;
  var fromBanked = ch.totalBanked || 0;
  var toSaved = 0;
  var toBanked = +((fromBanked + amount).toFixed(2));
  var duration = 1200;
  var steps = 60;
  var stepDuration = duration / steps;

  ch.totalBanked = toBanked;
  ch.goalSaved = 0;
  save(); render();

  // Animate goalSaved counting down and totalBanked counting up
  var step = 0;
  function animateBank() {
    step++;
    var progress = step / steps;
    var ease = 1 - Math.pow(1 - progress, 3);
    var curSaved  = fromSaved  - (fromSaved  * ease);
    var curBanked = fromBanked + (toBanked - fromBanked) * ease;

    // Update ring amount display
    var ringEl = document.querySelector('#jarSvgWrap + div div:first-child');
    if (ringEl) ringEl.textContent = '£' + curSaved.toFixed(2);

    // Update total banked in week card
    var bankedEl = document.querySelector('.week-saved-val');
    if (bankedEl) bankedEl.textContent = '£' + curBanked.toFixed(2);

    // Update ring arc
    var circle = document.querySelector('#jarSvgWrap circle:nth-child(2)');
    if (circle) {
      var col2 = COLORS[state.children.indexOf(ch)];
      var pct2 = Math.min(100, Math.round(curSaved / ch.goalTarget * 100));
      var r = 48, circ = 2*Math.PI*r;
      var dash = circ * pct2 / 100;
      circle.setAttribute('stroke-dasharray', dash + ' ' + (circ-dash));
    }

    if (step < steps) setTimeout(animateBank, stepDuration);
    else showMsg('£'+amount.toFixed(2)+' banked! Keep saving 💪', '#2f9e44');
  }
  animateBank();
}

function doSaveToJar(childId) {
  var ch  = state.children.find(function(c){return c.id===childId;});
  var net = weekNet(ch);
  if (net <= 0) { showMsg('Nothing to save yet!', '#e03131'); return; }
  if (!isSaturday()) { showMsg('Savings day is Saturday! Come back then 📅', '#e67700'); return; }


  var numCoins = 30;
  for (var i=0;i<numCoins;i++) {
    (function(idx) {
      setTimeout(function() {
        var coin = document.createElement('div');
        coin.className = 'coin-drop';
        coin.style.left = Math.random()*100+'vw';
        coin.style.top = '-24px';
        coin.style.setProperty('--dur', (0.8+Math.random()*0.8).toFixed(2)+'s');
        document.body.appendChild(coin);
        setTimeout(function(){coin.remove();}, 1800);
      }, idx*60);
    })(i);
  }
  setTimeout(function() {
    ch.goalSaved = +((ch.goalSaved||0) + net).toFixed(2);
    ch.weekEarned=0; ch.weekPenalties=0; ch.weekStart=weekStart();
    ch.weekSaved=true;
    ch.weekSavedDate=todayStr();
    ch.earningChores.forEach(function(c){c.done=false;c.lastDone=''});
    ch.expectedDone={};
    save(); render();
    // Trigger ripple at new fill level after render
    setTimeout(function() {
      var jarWrap2 = document.getElementById('jarSvgWrap');
      if (jarWrap2) {
        var col2 = COLORS[state.children.indexOf(ch)];
        var pct2 = Math.min(100, Math.round((ch.goalSaved||0) / ch.goalTarget * 100));
        jarWrap2.innerHTML = jarSVG(pct2, col2.accent1, true);
        setTimeout(function() { startWaveAnimation(col2.accent1); }, 30);
      }
    }, 50);
    // Check if jar is now full
    if (ch.goalSaved >= ch.goalTarget) {
      // Auto 50p bonus for reaching goal — added to goalSaved so they bank £10.50
      ch.goalSaved = +((ch.goalSaved||0) + 0.50).toFixed(2);
      save();
      // Suppress badge popups — goal celebration takes priority
      setTimeout(function() { showGoalReachedCelebration(ch); }, 200);
    } else {
      var nb3 = checkBadges(ch, state.children); if (nb3.length) { setTimeout(function(){queueBadge(nb3[0]);},2800); }
    }
  }, numCoins*60+900);
}

function miniBurst(x, y, accent) {
  // Small localised confetti burst from tap point
  var COLS = [accent, '#ffd43b', '#fff', '#ff922b', accent];
  for (var i = 0; i < 18; i++) {
    (function(idx) {
      setTimeout(function() {
        var p = document.createElement('div');
        var size = 4 + Math.random() * 5;
        var angle = Math.random() * Math.PI * 2;
        var dist = 30 + Math.random() * 50;
        var tx = Math.cos(angle) * dist;
        var ty = Math.sin(angle) * dist - 20;
        var color = COLS[Math.floor(Math.random() * COLS.length)];
        p.style.cssText = 'position:fixed;pointer-events:none;z-index:500;' +
          'width:'+size+'px;height:'+size+'px;' +
          'background:'+color+';border-radius:'+(Math.random()>0.5?'50%':'2px')+';' +
          'left:'+(x-size/2)+'px;top:'+(y-size/2)+'px;' +
          'animation:miniBurstAnim .6s ease-out forwards;' +
          '--tx:'+tx+'px;--ty:'+ty+'px;--rot:'+(Math.random()*360)+'deg;opacity:1';
        document.body.appendChild(p);
        setTimeout(function(){p.remove();}, 700);
      }, idx * 20);
    })(i);
  }
  // Also spawn emoji sparks
  var sparks = ['⭐','✨','💫'];
  for (var j = 0; j < 3; j++) {
    (function(idx) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'coin-particle';
        el.textContent = sparks[idx % sparks.length];
        el.style.fontSize = (14+Math.random()*8)+'px';
        el.style.background = 'none';
        el.style.boxShadow = 'none';
        var a = (Math.PI*2*idx/3)-Math.PI/2, d = 40+Math.random()*30;
        el.style.setProperty('--dx', Math.cos(a)*d+'px');
        el.style.setProperty('--dy', Math.sin(a)*d+'px');
        el.style.left=x+'px'; el.style.top=y+'px';
        el.style.animationDuration = (0.5+Math.random()*0.3)+'s';
        document.body.appendChild(el);
        setTimeout(function(){el.remove();},800);
      }, idx * 60);
    })(j);
  }
}

function spawnCoins(e) {
  var x = (e&&e.clientX)||innerWidth/2, y = (e&&e.clientY)||innerHeight/2;
  var col = COLORS[activeIdx];
  var accent = col ? col.accent1 : '#9775fa';
  // Mix of accent colour dots and fun emojis
  var emojis = ['⭐','✨','💫','🌟'];
  var numDots = 6, numEmoji = 3;
  // Coloured dot particles
  for (var i=0;i<numDots;i++) {
    (function(idx) {
      var el = document.createElement('div');
      el.style.cssText = 'position:fixed;pointer-events:none;z-index:200;width:'+(8+Math.random()*8)+'px;height:'+(8+Math.random()*8)+'px;border-radius:50%;background:'+accent+';opacity:1;animation:coin-fly '+(0.5+Math.random()*0.4)+'s ease-out forwards';
      var a = (Math.PI*2*idx/numDots)-Math.PI/2, d = 40+Math.random()*50;
      el.style.setProperty('--dx', Math.cos(a)*d+'px');
      el.style.setProperty('--dy', Math.sin(a)*d+'px');
      el.style.left=x+'px'; el.style.top=y+'px';
      document.body.appendChild(el);
      setTimeout(function(){el.remove();},900);
    })(i);
  }
  // Emoji sparks
  for (var j=0;j<numEmoji;j++) {
    (function(idx) {
      var el = document.createElement('div');
      el.className = 'coin-particle';
      el.textContent = emojis[idx % emojis.length];
      el.style.fontSize = (16+Math.random()*8)+'px';
      el.style.background = 'none';
      el.style.boxShadow = 'none';
      var a = (Math.PI*2*idx/numEmoji), d = 55+Math.random()*40;
      el.style.setProperty('--dx', Math.cos(a)*d+'px');
      el.style.setProperty('--dy', Math.sin(a)*d+'px');
      el.style.left=x+'px'; el.style.top=y+'px';
      el.style.animationDuration = (0.7+Math.random()*0.3)+'s';
      document.body.appendChild(el);
      setTimeout(function(){el.remove();},1000);
    })(j);
  }
}
var _cf=null;
function launchConfetti() {
  var cv=document.getElementById('confetti-canvas'),ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  var COLS=['#ff6b6b','#ffd43b','#40c057','#ff922b','#339af0','#9775fa','#20c997'],ps=[],f=0;
  for(var i=0;i<120;i++) ps.push({x:Math.random()*cv.width,y:-10-Math.random()*100,w:6+Math.random()*8,h:10+Math.random()*6,color:COLS[Math.floor(Math.random()*COLS.length)],vx:(Math.random()-.5)*3,vy:2+Math.random()*3,rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.2,alpha:1});
  function draw(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.rot+=p.rv;if(f>90)p.alpha=Math.max(0,p.alpha-.015);ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});f++;if(ps.some(function(p){return p.alpha>0;})){ _cf=requestAnimationFrame(draw);}else ctx.clearRect(0,0,cv.width,cv.height);}
  if(_cf)cancelAnimationFrame(_cf);draw();
}
var _ac=null;
function playTick(){
  try{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();var o=_ac.createOscillator(),g=_ac.createGain();o.connect(g);g.connect(_ac.destination);o.type='sine';o.frequency.setValueAtTime(880,_ac.currentTime);o.frequency.exponentialRampToValueAtTime(1200,_ac.currentTime+.1);g.gain.setValueAtTime(.12,_ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,_ac.currentTime+.3);o.start(_ac.currentTime);o.stop(_ac.currentTime+.3);}catch(e){}
}

// ── INIT ─────────────────────────────────────────────────
function initApp() {
  try { state = loadLocal(); } catch(e) { state = freshState(); }
  render();
  document.body.style.background = COLORS[activeIdx].bg;
  document.documentElement.style.setProperty('--child-bg', COLORS[activeIdx].bg);

  // Supabase in background
  try {
    loadSupabaseLib().then(function() {
      try {
        var client = getSb();
        if (!client) return;
        client.from('app_state').select('state').eq('id',1).single().then(function(res) {
          try {
            if (res&&res.data&&res.data.state) {
              var s = typeof res.data.state==='string'?JSON.parse(res.data.state):res.data.state;
              if (s&&s.children) { state=seedWeeklyLog(applyResets(s)); saveLocal(); render(); }
            }
          } catch(e) {}
          try {
            var channelId = 'cq-' + Math.random().toString(36).slice(2);
            client.channel(channelId).on('postgres_changes',{event:'UPDATE',schema:'public',table:'app_state'},function(p){
              try {
                var s = typeof p.new.state==='string'?JSON.parse(p.new.state):p.new.state;
                if (s&&s.children) {
                  // Merge activityLogs so neither phone loses history
                  s.children.forEach(function(remCh, i) {
                    var locCh = state.children[i];
                    if (locCh && locCh.activityLog && remCh) {
                      Object.keys(locCh.activityLog).forEach(function(k) {
                        if (!remCh.activityLog) remCh.activityLog = {};
                        if (!remCh.activityLog[k]) remCh.activityLog[k] = locCh.activityLog[k];
                        else if (typeof remCh.activityLog[k] === 'object' && typeof locCh.activityLog[k] === 'object') {
                          remCh.activityLog[k].daily   = remCh.activityLog[k].daily   || locCh.activityLog[k].daily;
                          remCh.activityLog[k].special = remCh.activityLog[k].special || locCh.activityLog[k].special;
                        }
                      });
                    }
                  });
                  state=seedWeeklyLog(applyResets(s)); saveLocal(); render();
                }
              } catch(e) {}
            }).subscribe();
          } catch(e) {}


        }).catch(function(){});
      } catch(e) {}
    }).catch(function(){});
  } catch(e) {}
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});

// Suppress cross-origin "Script error." from Supabase CDN on iOS Safari
window.addEventListener('unhandledrejection', function(e) { e.preventDefault(); });
window.addEventListener('error', function(e) { if (e.message === 'Script error.') e.preventDefault(); });

// Re-fetch from Supabase when app comes back into focus (iOS suspends WebSockets)
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    try {
      var client = getSb();
      if (!client) return;
      client.from('app_state').select('state').eq('id',1).single().then(function(res) {
        try {
          if (res&&res.data&&res.data.state) {
            var s = typeof res.data.state==='string'?JSON.parse(res.data.state):res.data.state;
            if (s&&s.children) { state=seedWeeklyLog(applyResets(s)); saveLocal(); render(); }
          }
        } catch(e) {}
      }).catch(function(){});
    } catch(e) {}
  }
});
