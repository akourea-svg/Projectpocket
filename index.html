<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ProjectPocket 🌟</title>
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ProjectPocket">
<meta name="theme-color" content="#9775fa">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#9775fa;--yellow:#ffd43b;--green:#40c057;--red:#ff4757;--orange:#ff922b;
  --text-dark:#212529;--text-mid:#868e96;
  --radius:16px;--radius-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-sm:0 1px 6px rgba(0,0,0,0.06);
}
html,body{min-height:100vh}
body{font-family:'Nunito',system-ui,sans-serif;font-style:normal;background:var(--child-bg,#f4f0fa);min-height:100vh;color:var(--text-dark);overflow-x:hidden;padding-bottom:80px;transition:background 0.3s ease}
#pin-screen{position:fixed;inset:0;z-index:9999;background:#f0ecff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.pin-logo{font-size:3.5rem;margin-bottom:6px;line-height:1}
.pin-title{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:2.2rem;color:var(--purple);margin-bottom:4px;line-height:1}
.pin-subtitle{font-size:.9rem;font-weight:600;font-style:normal;color:var(--text-mid);margin-bottom:36px}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:18px;height:18px;border-radius:50%;background:#e0d8f8;border:2px solid #c4b4f0;transition:background .15s}
.pin-dot.filled{background:var(--purple);border-color:var(--purple)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pin-key{background:#fff;border:none;border-radius:14px;padding:18px 10px;font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:1.5rem;color:var(--text-dark);box-shadow:var(--shadow-sm);cursor:pointer;transition:background .1s,transform .1s;-webkit-tap-highlight-color:transparent;user-select:none}
.pin-key:active{background:#e0d8f8;transform:scale(.93)}
.pin-key.del{font-size:1.2rem;color:var(--text-mid)}
.pin-key.empty{background:transparent;box-shadow:none;cursor:default;pointer-events:none}
.pin-error{margin-top:18px;color:var(--red);font-weight:700;font-style:normal;font-size:.9rem;min-height:22px;text-align:center}
.pin-hint{margin-top:12px;font-size:.75rem;font-style:normal;color:#bbb;font-weight:600}
.app-header{background:transparent;padding:18px 20px 14px;text-align:center;border-bottom:1px solid rgba(0,0,0,.06)}
.app-title{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:2rem;color:var(--purple);line-height:1}
.parent-bar{display:flex;justify-content:flex-end;padding:10px 14px 10px;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid rgba(0,0,0,.08);z-index:100}
.parent-bar-btn{background:#f1f3f5;border:none;color:var(--text-mid);border-radius:8px;padding:7px 16px;font-family:'Nunito',system-ui,sans-serif;font-style:normal;font-size:.8rem;font-weight:800;cursor:pointer;transition:all .15s}
.parent-bar-btn.active{background:var(--purple);color:#fff}
.child-tabs{display:flex;padding:14px 14px 0;gap:10px}
.child-tab{flex:1;background:#f1f3f5;border:none;border-radius:var(--radius);padding:14px 8px;cursor:pointer;transition:background .15s,box-shadow .15s;text-align:center}
.child-tab.active{background:var(--tab-c1,#9775fa);box-shadow:0 4px 14px rgba(0,0,0,.12)}
.tab-avatar{font-size:2.2rem;display:block;line-height:1}
.tab-name{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:1rem;color:var(--text-mid);margin-top:3px;display:block}
.child-tab.active .tab-name{color:#fff}
.tab-week{font-size:.8rem;font-weight:800;font-style:normal;color:var(--text-mid);display:block;margin-top:1px}
.child-tab.active .tab-week{color:rgba(255,255,255,.85)}
.main-content{padding:14px}
.week-card{border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.week-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.week-label{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;color:rgba(255,255,255,.8);font-size:.82rem}
.week-amount{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:2.6rem;color:#fff;line-height:1}
.week-right{text-align:right}
.week-saved-label{font-size:.72rem;color:rgba(255,255,255,.75);font-weight:700;font-style:normal;text-transform:uppercase;letter-spacing:.5px}
.week-saved-val{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:1.4rem;color:#fff}
.week-bar-track{background:rgba(255,255,255,.25);border-radius:50px;height:10px;overflow:hidden}
.week-bar-fill{height:100%;border-radius:50px;background:rgba(255,255,255,.9);transition:width .5s ease}
.week-row-label{font-size:.75rem;font-weight:800;font-style:normal;color:rgba(255,255,255,.8);margin-bottom:5px;margin-top:10px}
.week-bar-ends{display:flex;justify-content:space-between;margin-top:3px}
.week-bar-ends span{font-size:.7rem;font-weight:700;font-style:normal;color:rgba(255,255,255,.65)}
.jar-section{background:rgba(255,255,255,.82);border-radius:var(--radius);padding:18px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm);text-align:center}
.jar-title{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:1rem;color:var(--text-dark);margin-bottom:4px}
.jar-goal-label{font-size:.75rem;font-weight:700;color:var(--text-mid);margin-bottom:14px}
.jar-wrap{display:flex;align-items:flex-end;justify-content:center;gap:20px;margin-bottom:16px}
.jar-svg-wrap{position:relative;width:110px;height:140px}
.jar-amounts{text-align:left}
.jar-saved{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:2rem;color:var(--c-accent1,#9775fa);line-height:1}
.jar-target{font-size:.8rem;font-weight:700;color:var(--text-mid);margin-top:2px}
.jar-pct{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:1rem;color:var(--text-mid);margin-top:4px}
.jar-save-btn{display:block;width:100%;background:var(--c-accent1,#9775fa);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:1.1rem;cursor:pointer;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.jar-save-btn:active{opacity:.85}
.jar-save-btn.armed{background:#e67700}
.coin-drop{position:fixed;pointer-events:none;z-index:500;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffe566,#f59f00 55%,#c87800);box-shadow:0 2px 5px rgba(0,0,0,.2);animation:coinRain var(--dur,1.2s) linear forwards}
@keyframes coinRain{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.section-heading{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;color:var(--text-dark);font-size:1rem;margin-bottom:8px;padding-left:2px;display:flex;align-items:center;gap:7px}
.expected-section{background:rgba(255,255,255,.82);border-radius:var(--radius);padding:14px 15px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.expected-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.expected-title{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;color:var(--text-dark);font-size:1rem}
.expected-badge{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:.75rem;background:var(--yellow);color:var(--text-dark);border-radius:6px;padding:3px 10px}
.expected-subtitle{font-size:.76rem;font-style:normal;color:var(--text-mid);font-weight:600;margin-bottom:11px}
.expected-list{display:flex;flex-direction:column;gap:6px}
.expected-card{background:rgba(255,255,255,.6);border-radius:var(--radius-sm);padding:11px 13px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none}
.expected-card.done{background:rgba(235,251,238,.88)}
.expected-card:active{transform:scale(.98)}
.expected-emoji{font-size:1.4rem;flex-shrink:0;width:30px;text-align:center}
.expected-name{flex:1;font-weight:700;font-style:normal;color:var(--text-dark);font-size:.9rem}
.expected-card.done .expected-name{text-decoration:line-through;color:var(--text-mid)}
.expected-check{width:26px;height:26px;border-radius:50%;border:2px solid #dee2e6;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:transparent;transition:all .15s;background:#fff}
.expected-card.done .expected-check{background:var(--green);border-color:var(--green);color:#fff}
.chores-list{display:flex;flex-direction:column;gap:8px}
.chore-card{background:rgba(255,255,255,.82);border-radius:var(--radius);padding:14px 15px;display:flex;align-items:center;gap:13px;box-shadow:var(--shadow-sm);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:all .15s}
.chore-card.done{background:rgba(235,251,238,.88)}
.chore-card.done-locked{opacity:.5;cursor:default}
.chore-card:not(.done-locked):active{transform:scale(.98)}
.chore-emoji{font-size:1.8rem;flex-shrink:0;width:38px;text-align:center;line-height:1}
.chore-info{flex:1;min-width:0}
.chore-name{font-weight:800;font-style:normal;font-size:.95rem;color:var(--text-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chore-card.done .chore-name{text-decoration:line-through;color:var(--text-mid)}
.chore-checkbox{width:32px;height:32px;border-radius:50%;border:2px solid #dee2e6;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;background:#f8f9fa;color:transparent}
.chore-card.done .chore-checkbox{background:var(--green);border-color:var(--green);color:#fff}
.chore-edit-btns{display:flex;gap:5px;flex-shrink:0}
.icon-btn{width:30px;height:30px;border-radius:7px;border:none;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.icon-btn:active{transform:scale(.88)}
.btn-edit{background:#e7f5ff}
.btn-del{background:#fff5f5}
.deduction-section{background:rgba(255,243,205,.95);border-radius:var(--radius);padding:16px 18px;margin-top:14px}
.deduction-label{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;color:#664d03;font-size:1rem;margin-bottom:2px}
.deduction-sub{font-size:.75rem;font-weight:700;font-style:normal;color:#997404;margin-bottom:12px}
.deduction-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.deduction-btn{display:flex;align-items:center;gap:8px;border:none;border-radius:12px;padding:12px 18px;cursor:pointer;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.deduction-btn:active{opacity:.8}
.deduction-btn:disabled{opacity:.35;cursor:default}
.deduction-btn-icon{font-size:1.4rem;font-weight:900;color:#fff;line-height:1}
.deduction-btn-label{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:1rem;color:#fff}
.parent-panel{background:rgba(255,255,255,.82);border-radius:var(--radius);padding:16px;margin-top:14px;box-shadow:var(--shadow-sm)}
.parent-panel h3{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;color:var(--text-dark);font-size:1rem;margin-bottom:12px}
.panel-section{background:rgba(0,0,0,.04);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px}
.panel-label{color:var(--text-dark);font-size:.88rem;font-weight:700;font-style:normal;margin-bottom:8px}
.btn-action{width:100%;padding:12px;border:none;border-radius:var(--radius-sm);font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:1rem;cursor:pointer;margin-bottom:8px;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.btn-action:active{opacity:.85}
.btn-reset{background:#f1f3f5;color:var(--text-mid)}
.btn-danger{background:#fff0f0;color:var(--red)}
.goal-edit-row{display:flex;gap:7px}
.form-input{background:#f8f9fa;border:1.5px solid #dee2e6;border-radius:var(--radius-sm);padding:9px 11px;font-family:'Nunito',system-ui,sans-serif;font-style:normal;font-size:.9rem;font-weight:700;color:var(--text-dark);width:100%;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--purple);background:#fff}
.btn-save{background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 16px;font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:.9rem;cursor:pointer;white-space:nowrap}
.add-chore-section{background:rgba(255,255,255,.7);border-radius:var(--radius);padding:14px;margin-top:12px}
.add-chore-section h4{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;color:var(--text-dark);font-size:.95rem;margin-bottom:10px}
.btn-primary{display:block;width:100%;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);padding:11px;font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:1rem;cursor:pointer}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;padding:16px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:440px;transform:translateY(30px);transition:transform .25s ease}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-title{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:1.3rem;color:var(--text-dark);margin-bottom:14px}
.modal-field{margin-bottom:11px}
.modal-field label{display:block;font-weight:700;font-style:normal;font-size:.82rem;color:var(--text-mid);margin-bottom:3px}
.modal-actions{display:flex;gap:9px;margin-top:16px}
.btn-secondary{flex:1;background:#f1f3f5;color:var(--text-dark);border:none;border-radius:var(--radius-sm);padding:11px;font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-style:normal;font-weight:normal;font-size:.95rem;cursor:pointer}
.modal-actions .btn-primary{flex:2}
.week-notice{text-align:center;color:var(--text-mid);font-size:.72rem;font-weight:600;font-style:normal;margin-top:10px}
.streak-section{background:rgba(255,255,255,.82);border-radius:var(--radius);padding:14px 16px;margin-top:14px;box-shadow:var(--shadow-sm)}
.streak-inner{display:flex;align-items:center;gap:14px}
.streak-flame{font-size:2.4rem;line-height:1}
.streak-count{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-size:1.6rem;color:var(--c-accent1,#9775fa);line-height:1}
.streak-label{font-size:.75rem;font-weight:600;color:var(--text-mid);margin-top:2px}
.chart-section{background:rgba(255,255,255,.82);border-radius:var(--radius);padding:14px 16px;margin-top:14px;box-shadow:var(--shadow-sm)}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.chart-title{font-family:'Fredoka One','Arial Rounded MT Bold',Arial,sans-serif;font-size:1rem;color:var(--text-dark)}
.chart-sub{font-size:.75rem;font-weight:600;color:var(--text-mid)}
.chart-timeline{display:flex;gap:2px;overflow-x:auto;align-items:flex-end;padding-bottom:4px;min-height:80px}
.tl-col{display:flex;flex-direction:column;align-items:center;min-width:18px;flex-shrink:0}
.tl-bar-wrap{flex:1;display:flex;align-items:flex-end;height:52px;width:14px}
.tl-bar{width:14px;border-radius:4px 4px 0 0;background:#f1f3f5;height:16px}
.tl-bar-today{outline:2px solid var(--text-dark);outline-offset:1px;border-radius:4px 4px 0 0}
.tl-stack{display:flex;flex-direction:column;width:14px;border-radius:4px 4px 0 0;overflow:hidden;height:52px}
.tl-seg{flex:1}
.tl-seg-daily{background:var(--c-accent1,#9775fa)}
.tl-seg-special{background:var(--green)}
.tl-label{font-size:.5rem;font-weight:700;color:var(--text-mid);text-align:center;margin-top:3px;line-height:1.3;min-height:24px}
.tl-label span{font-weight:600;color:#bbb}
.chart-stats{display:flex;justify-content:space-between;margin-top:8px;font-size:.72rem;font-weight:700;color:var(--text-mid)}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999;width:100%;height:100%}
.coin-particle{position:fixed;pointer-events:none;z-index:200;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffe066,#f59f00 60%,#b36d00);box-shadow:0 2px 4px rgba(0,0,0,.2);animation:coin-fly .85s ease-out forwards}
@keyframes coin-fly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(.1);opacity:0}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div id="pin-screen">
  <div class="pin-logo">🌟</div>
  <div class="pin-title">ProjectPocket</div>
  <div class="pin-subtitle">Enter your PIN to continue</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-error" id="pinError"></div>
  <div class="pin-hint" id="pinHint"></div>
</div>

<div id="app" style="display:none">
  <header class="app-header">
    <div class="app-title">🌟 ProjectPocket</div>
  </header>
  <div class="child-tabs" id="childTabs"></div>
  <div class="main-content" id="mainContent"></div>
  <div id="parentControls" style="display:none;padding:0 14px 14px"></div>
</div>

<div class="parent-bar" id="parentBar">
  <button class="parent-bar-btn" id="editToggleBtn">⚙️ Parent</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-title">✏️ Edit Special Quest</div>
    <div class="modal-field"><label>Emoji</label><input class="form-input" id="modalEmoji" maxlength="4"></div>
    <div class="modal-field"><label>Name</label><input class="form-input" id="modalName"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="modalCancelBtn">Cancel</button>
      <button class="btn-primary" id="modalSaveBtn">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="expModalOverlay">
  <div class="modal-sheet">
    <div class="modal-title">✏️ Edit Daily Quest</div>
    <div class="modal-field"><label>Emoji</label><input class="form-input" id="expModalEmoji" maxlength="4"></div>
    <div class="modal-field"><label>Name</label><input class="form-input" id="expModalName"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="expModalCancelBtn">Cancel</button>
      <button class="btn-primary" id="expModalSaveBtn">Save</button>
    </div>
  </div>
</div>

<script>

function freshState() {
  return {children:[makeChild('c1','Ada','🦁',1), makeChild('c2','Riley','🐷',4)]};
}
function applyResets(s) {
  var ws = weekStart(), td = todayStr();
  if (!s || !s.children || !Array.isArray(s.children) || s.children.length < 2) return freshState();
  s.children.forEach(function(ch) {
    if (!ch || typeof ch !== 'object') return;
    if (ch.weekStart !== ws) { ch.weekStart=ws; ch.weekEarned=0; ch.weekPenalties=0; }
    if (!Array.isArray(ch.earningChores)) ch.earningChores = [];
    ch.earningChores.forEach(function(c) { if (!c.lastDone) c.lastDone=''; if (c.lastDone !== td) c.done=false; });
    if (ch.lastExpectedDate !== td) { ch.expectedDone={}; ch.lastExpectedDate=td; }
    if (!ch.goalName)   ch.goalName   = 'My Savings Goal';
    if (!ch.goalTarget) ch.goalTarget = 10;
    if (!Array.isArray(ch.expectedTasks) || !ch.expectedTasks.length) {
      ch.expectedTasks = DEFAULT_EXPECTED.map(function(e) { return {id:e.id, emoji:e.emoji, name:e.name}; });
    }
    if (typeof ch.weekPenalties !== 'number') ch.weekPenalties = 0;
    if (typeof ch.weekEarned    !== 'number') ch.weekEarned    = 0;
    if (typeof ch.totalSaved    !== 'number') ch.totalSaved    = 0;
    if (typeof ch.weekSaved !== 'boolean') ch.weekSaved = false;
    if (typeof ch.activityLog !== 'object' || !ch.activityLog) ch.activityLog = {};
    // Reset weekSaved on new week
    if (ch.weekStart !== weekStart()) ch.weekSaved = false;
    // Backfill activityLog from existing chore data
    var td2 = todayStr();
    if (ch.earningChores) ch.earningChores.forEach(function(chore) {
      if (chore.lastDone && chore.lastDone !== '') {
        var key = chore.lastDone;
        if (!ch.activityLog[key] || ch.activityLog[key] === true) ch.activityLog[key] = {daily:false, special:false};
        if (typeof ch.activityLog[key] === 'object') ch.activityLog[key].special = true;
      }
    });
    // If expected tasks done today, mark today
    if (ch.lastExpectedDate === td2 && ch.expectedDone) {
      var anyExp = Object.keys(ch.expectedDone).some(function(k){return ch.expectedDone[k];});
      if (anyExp) {
        if (!ch.activityLog[td2] || ch.activityLog[td2] === true) ch.activityLog[td2] = {daily:false, special:false};
        if (typeof ch.activityLog[td2] === 'object') ch.activityLog[td2].daily = true;
      }
    }
    // Migrate old boolean format to new object format
    Object.keys(ch.activityLog).forEach(function(key) {
      if (ch.activityLog[key] === true) ch.activityLog[key] = {daily:true, special:false};
    });
  });
  return s;
}
function loadLocal() {
  // Clear old storage versions to prevent corrupted state
  try { ['cq_v4','cq_v5','cq_v6'].forEach(function(k){ localStorage.removeItem(k); }); } catch(e) {}
  try {
    var r = localStorage.getItem('cq_v7');
    if (!r) return freshState();
    var parsed = JSON.parse(r);
    var result = applyResets(parsed);
    // Final sanity check
    if (!result || !result.children || result.children.length < 2) return freshState();
    return result;
  }
  catch(e) { return freshState(); }
}
function saveLocal() { try { localStorage.setItem('cq_v7', JSON.stringify(state)); } catch(e) {} }

// Record today as active — type is 'daily' or 'special'
function recordActivity(ch, type) {
  if (!ch.activityLog) ch.activityLog = {};
  var td = todayStr();
  if (typeof ch.activityLog[td] !== 'object' || ch.activityLog[td] === true) {
    ch.activityLog[td] = {daily:false, special:false};
  }
  if (type === 'daily')   ch.activityLog[td].daily   = true;
  if (type === 'special') ch.activityLog[td].special = true;
}

// Calculate current streak
function isActiveDay(log, key) {
  var v = log[key];
  if (!v) return false;
  if (v === true) return true;
  return v.daily || v.special;
}
function calcStreak(ch) {
  if (!ch.activityLog) return 0;
  var streak = 0;
  var d = new Date();
  d.setDate(d.getDate() - 1);
  while (true) {
    var key = d.toISOString().slice(0,10);
    if (!isActiveDay(ch.activityLog, key)) break;
    streak++;
    d.setDate(d.getDate() - 1);
    if (streak > 365) break;
  }
  if (isActiveDay(ch.activityLog, todayStr())) streak++;
  return streak;
}

// Generate chart HTML — horizontal timeline, today on left, stacked bars
function activityChartHTML(ch, days) {
  if (!ch.activityLog) ch.activityLog = {};
  var today = new Date();
  today.setHours(0,0,0,0);
  var DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  var html = '<div class="chart-timeline">';
  // Today first (index 0), oldest last
  for (var i = 0; i < days; i++) {
    var d = new Date(today);
    d.setDate(today.getDate() - i);
    var key = d.toISOString().slice(0,10);
    var v = ch.activityLog[key];
    var hasDaily   = v && (v === true || v.daily);
    var hasSpecial = v && (v !== true && v.special);
    var active = hasDaily || hasSpecial;
    var isToday = i === 0;
    var dayLabel = isToday ? 'Today' : DAY_SHORT[d.getDay()];
    var showDate = isToday || d.getDay() === 1 || d.getDate() === 1;

    html += '<div class="tl-col">';
    html += '<div class="tl-bar-wrap">';
    if (active) {
      // Stacked: special on bottom, daily on top
      html += '<div class="tl-stack">';
      if (hasSpecial) html += '<div class="tl-seg tl-seg-special"></div>';
      if (hasDaily)   html += '<div class="tl-seg tl-seg-daily"></div>';
      html += '</div>';
    } else {
      html += '<div class="tl-bar'+(isToday?' tl-bar-today':'')+'"></div>';
    }
    html += '</div>';
    html += '<div class="tl-label">'+(showDate ? dayLabel+'<br><span>'+d.getDate()+' '+MONTH_SHORT[d.getMonth()]+'</span>' : '')+'</div>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function weekNet(ch) {
  if (!ch) return 0;
  return +(Math.max(0, WEEKLY_BASE - (ch.weekPenalties||0)) + Math.min(BONUS_CAP, (ch.weekEarned||0))).toFixed(2);
}
function bonusEarned(ch) { return Math.min(BONUS_CAP, ch.weekEarned||0); }
function canAddBonus(ch) { return (ch.weekEarned||0) < BONUS_CAP; }
function expCount(ch) { return (ch.expectedTasks||[]).filter(function(e) { return ch.expectedDone[e.id]; }).length; }

    '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:var(--c-accent1,#9775fa)"></div><span style="font-size:.65rem;font-weight:700;color:var(--text-mid)">Daily</span></div>' +
    '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:var(--green)"></div><span style="font-size:.65rem;font-weight:700;color:var(--text-mid)">Special</span></div>' +
    '</div>' +
    '</div>' +
    activityChartHTML(ch, 28) +
    (editMode ? '<div class="chart-stats">' +
      '<span>'+Object.keys(ch.activityLog||{}).filter(function(k){return isActiveDay(ch.activityLog,k);}).length+' days active</span>' +
      '<span>'+Math.round(Object.keys(ch.activityLog||{}).filter(function(k){return isActiveDay(ch.activityLog,k);}).length/28*100)+'% (28d)</span>' +
      '</div>' : '') +
    '</div>';

  // Parent controls
  var pc = document.getElementById('parentControls');
  if (editMode) {
    pc.style.display = 'block';
    pc.innerHTML =
      '<div class="add-chore-section">' +
      '<h4>➕ Add Daily Quest for '+ch.name+'</h4>' +
      '<div style="display:grid;grid-template-columns:56px 1fr;gap:7px;margin-bottom:8px">' +
      '<input class="form-input" id="newExpEmoji" maxlength="4" value="⭐" style="text-align:center;font-size:1.3rem">' +
      '<input class="form-input" id="newExpName" placeholder="Quest name…"></div>' +
      '<button class="btn-primary" id="addExpBtn" style="margin-bottom:12px">Add Daily Quest ✨</button>' +
      '<h4>➕ Add Special Quest for '+ch.name+'</h4>' +
      '<div style="display:grid;grid-template-columns:56px 1fr;gap:7px;margin-bottom:8px">' +
      '<input class="form-input" id="newEmoji" maxlength="4" value="🧹" style="text-align:center;font-size:1.3rem">' +
      '<input class="form-input" id="newName" placeholder="Quest name…"></div>' +
      '<button class="btn-primary" id="addChoreBtn" style="margin-bottom:4px">Add Special Quest ✨</button></div>' +
      '<div class="parent-panel"><h3>👨‍👩‍👧 Parent Controls — '+ch.name+'</h3>' +
      '<div class="panel-section"><div class="panel-label">🎯 Savings Goal</div>' +
      '<div class="goal-edit-row">' +
      '<input class="form-input" id="goalName_'+ch.id+'" value="'+esc(ch.goalName)+'">' +
      '<input class="form-input" id="goalAmt_'+ch.id+'" type="number" step="1" min="1" value="'+ch.goalTarget.toFixed(2)+'" style="max-width:80px">' +
      '<button class="btn-save" id="saveGoalBtn">Save</button></div></div>' +
      '<button class="btn-action btn-reset" id="resetDeductBtn">↩️ Reset deductions to zero</button>' +
      '<button class="btn-action btn-reset" id="resetDayBtn">🔄 Reset today\'s Daily Quests</button>' +
      '<button class="btn-action btn-reset" id="resetQuestsBtn">🔄 Reset quest lists to defaults</button>' +
      '<button class="btn-action btn-danger" id="resetAllBtn">🗑️ Reset ALL data to zero</button>' +
      '<button class="btn-action btn-reset" id="testSatBtn">🗓️ '+(_testSaturday?'Test mode ON — tap to turn off':'Test Saturday mode')+'</button>' +
      '<div class="panel-section" style="margin-top:8px"><div class="panel-label">🔑 Change PIN</div>' +
      '<input class="form-input" id="pinNew" type="password" inputmode="numeric" maxlength="4" placeholder="New 4-digit PIN" style="margin-bottom:7px">' +
      '<input class="form-input" id="pinConfirm" type="password" inputmode="numeric" maxlength="4" placeholder="Confirm new PIN" style="margin-bottom:7px">' +
      '<div id="pinChangeMsg" style="font-size:.8rem;font-weight:700;min-height:18px;margin-bottom:7px"></div>' +
      '<button class="btn-save" id="changePinBtn" style="width:100%">Update PIN</button></div></div>';

    // Bind parent control events
    bindBtn('addExpBtn',      function() { addExpectedTask(ch.id); });
    bindBtn('addChoreBtn',    function() { addChore(ch.id); });
    bindBtn('saveGoalBtn',    function() { saveGoal(ch.id); });
    bindBtn('testSatBtn', function() {
      if (!_testSaturday) {
        // Enabling test mode — snapshot current state
        _testSnapshot = JSON.parse(JSON.stringify(state));
        _testSaturday = true;
      } else {
        // Disabling test mode — restore snapshot
        _testSaturday = false;
        if (_testSnapshot) {
          state = applyResets(JSON.parse(JSON.stringify(_testSnapshot)));
          _testSnapshot = null;
          saveLocal();
        }
      }
      render();
    });
    setupDoubleTab('resetQuestsBtn', function() {
      ch.expectedTasks = DEFAULT_EXPECTED.map(function(e) { return {id:e.id, emoji:e.emoji, name:e.name}; });
      ch.earningChores = DEFAULT_CHORES.map(function(c,i) { return {id:'p'+(Date.now()+i), emoji:c.emoji, name:c.name, done:false, lastDone:''}; });
      save(); render();
    });
    setupDoubleTab('resetDeductBtn', function() { ch.weekPenalties=0; save(); render(); });
    setupDoubleTab('resetDayBtn',    function() { ch.expectedDone={}; save(); render(); });
    setupDoubleTab('resetAllBtn',    function() {
      ch.totalSaved=0; ch.weekEarned=0; ch.weekPenalties=0;
      ch.weekStart=weekStart();
      ch.earningChores.forEach(function(c){c.done=false;c.lastDone='';});
      ch.expectedDone={}; ch.lastExpectedDate='';
      save(); render();
    });
    bindBtn('changePinBtn', function() {
      var next = document.getElementById('pinNew').value.trim();
      var conf = document.getElementById('pinConfirm').value.trim();
      var msg  = document.getElementById('pinChangeMsg');
      if (!next || next.length!==4 || !/^\d{4}$/.test(next)) { msg.style.color='var(--red)'; msg.textContent='PIN must be exactly 4 digits'; return; }
      if (next!==conf) { msg.style.color='var(--red)'; msg.textContent='PINs do not match'; return; }
      try { localStorage.setItem(PIN_KEY, next); } catch(e) {}
      msg.style.color='var(--green)'; msg.textContent='PIN updated!';
      document.getElementById('pinNew').value='';
      document.getElementById('pinConfirm').value='';
      updatePinHint();
    });
  } else {
    pc.style.display = 'none';
    pc.innerHTML = '';
  }

  // Bind main content events (fresh each render — these elements are recreated)
  bindBtn('deductBtn', function() { addPenalty(ch.id); });
  bindBtn('bonusBtn',  function() { addBonus(ch.id); });
  bindBtn('jarSaveBtn', function() {
    var jsb = document.getElementById('jarSaveBtn');
    if (!jsb) return;
    if (jsb.dataset.armed === '1') {
      jsb.dataset.armed = '0'; jsb.classList.remove('armed');
      doSaveToJar(ch.id);
    } else {
      jsb.dataset.armed = '1'; jsb.textContent = '✅ Tap again to confirm!'; jsb.classList.add('armed');
      setTimeout(function() {
        if (jsb.dataset.armed==='1') { jsb.dataset.armed='0'; jsb.classList.remove('armed'); jsb.textContent='💰 Save this week\'s £'+weekNet(ch).toFixed(2)+'!'; }
      }, 3000);
    }
  });

  // Delegate expected list clicks
  var el = document.getElementById('expectedList');
  if (el) el.addEventListener('click', function(e) {
    var ab = e.target.closest('[data-action="editexp"],[data-action="delexp"]');
    if (ab) {
      e.stopPropagation();
      var child = state.children.find(function(c){return c.id===ab.dataset.child;});
      if (ab.dataset.action==='editexp') { openExpModal(child.id, child.expectedTasks.find(function(t){return t.id===ab.dataset.eid;})); return; }
      if (ab.dataset.action==='delexp') {
        if (ab.dataset.armed==='1') {
          ab.dataset.armed='0';
          child.expectedTasks=child.expectedTasks.filter(function(t){return t.id!==ab.dataset.eid;});
          delete child.expectedDone[ab.dataset.eid];
          save(); render();
        } else { ab.dataset.armed='1'; ab.textContent='✓?'; setTimeout(function(){if(ab.dataset.armed==='1'){ab.dataset.armed='0';ab.textContent='🗑️';}},2500); }
      }
      return;
    }
    var card = e.target.closest('.expected-card');
    if (!card || editMode) return;
    var child = state.children.find(function(c){return c.id===card.dataset.child;});
    if (!child) return;
    child.expectedDone[card.dataset.eid] = !child.expectedDone[card.dataset.eid];
    child.lastExpectedDate = todayStr();
    if (child.expectedDone[card.dataset.eid]) recordActivity(child, 'daily');
    save(); playTick(); render();
  });

  // Delegate chore list clicks
  var cl = document.getElementById('choresList');
  if (cl) cl.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-action="edit"],[data-action="del"]');
    if (btn) {
      e.stopPropagation();
      if (btn.dataset.action==='edit') openModal(btn.dataset.child, btn.dataset.cid);
      if (btn.dataset.action==='del')  deleteChore(btn.dataset.child, btn.dataset.cid);
      return;
    }
    if (editMode) return;
    var card = e.target.closest('.chore-card');
    if (!card || card.classList.contains('done-locked')) return;
    toggleChore(card.dataset.child, card.dataset.cid, e);
  });
}

// ── HELPERS ──────────────────────────────────────────────
function bindBtn(id, fn) {
  var el = document.getElementById(id);
  if (el) el.addEventListener('click', fn);
}

function setupDoubleTab(id, action) {
  var btn = document.getElementById(id);
  if (!btn) return;
  var orig = btn.textContent;
  btn.addEventListener('click', function() {
    if (btn.dataset.armed==='1') { btn.dataset.armed='0'; btn.textContent=orig; action(); }
    else { btn.dataset.armed='1'; btn.textContent='✅ Tap again to confirm';
      setTimeout(function(){if(btn.dataset.armed==='1'){btn.dataset.armed='0';btn.textContent=orig;}},3000); }
  });
}

// ── ACTIONS ──────────────────────────────────────────────
function switchChild(i) {
  activeIdx = i;
  document.documentElement.style.setProperty('--child-bg', COLORS[i].bg);
  render();
}

document.getElementById('editToggleBtn').addEventListener('click', function() {
  editMode = !editMode;
  this.textContent = editMode ? '✅ Done' : '⚙️ Parent';
  this.classList.toggle('active', editMode);
  render();
});

document.getElementById('childTabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.child-tab');
  if (tab) switchChild(parseInt(tab.dataset.idx));
});

function toggleChore(childId, choreId, e) {
  var ch    = state.children.find(function(c){return c.id===childId;});
  var chore = (ch.earningChores||[]).find(function(c){return c.id===choreId;});
  if (!chore) return;
  var td = todayStr();
  if (!chore.done || chore.lastDone !== td) {
    chore.done=true; chore.lastDone=td;
    recordActivity(ch, 'special');
    save(); spawnCoins(e); playTick(); render();
  } else {
    chore.done=false; chore.lastDone='';
    save(); render();
  }
}

function addPenalty(childId) {
  var ch = state.children.find(function(c){return c.id===childId;});
  if ((ch.weekPenalties||0) >= WEEKLY_BASE) return;
  ch.weekPenalties = +((ch.weekPenalties||0) + PENALTY_AMOUNT).toFixed(2);
  save(); render();
}

function addBonus(childId) {
  var ch = state.children.find(function(c){return c.id===childId;});
  if ((ch.weekEarned||0) >= BONUS_CAP) return;
  ch.weekEarned = +((ch.weekEarned||0) + BONUS_AMOUNT).toFixed(2);
  save(); render();
}

function doSaveToJar(childId) {
  var ch  = state.children.find(function(c){return c.id===childId;});
  var net = weekNet(ch);
  if (net <= 0) { showMsg('Nothing to save yet!', '#e03131'); return; }
  if (!isSaturday()) { showMsg('Savings day is Saturday! Come back then 📅', '#e67700'); return; }
  var numCoins = 30;
  for (var i=0;i<numCoins;i++) {
    (function(idx) {
      setTimeout(function() {
        var coin = document.createElement('div');
        coin.className = 'coin-drop';
        coin.style.left = Math.random()*100+'vw';
        coin.style.top = '-24px';
        coin.style.setProperty('--dur', (0.8+Math.random()*0.8).toFixed(2)+'s');
        document.body.appendChild(coin);
        setTimeout(function(){coin.remove();}, 1800);
      }, idx*60);
    })(i);
  }
  setTimeout(function() {
    ch.totalSaved = +((ch.totalSaved||0) + net).toFixed(2);
    ch.weekEarned=0; ch.weekPenalties=0; ch.weekStart=weekStart();
    ch.weekSaved=true;
    ch.earningChores.forEach(function(c){c.done=false;c.lastDone='';});
    ch.expectedDone={};
    save(); render();
    if (ch.totalSaved >= ch.goalTarget) setTimeout(launchConfetti, 400);
  }, numCoins*60+900);
}

function addExpectedTask(childId) {
  var emoji = document.getElementById('newExpEmoji').value.trim() || '⭐';
  var name  = document.getElementById('newExpName').value.trim();
  if (!name) { showMsg('Enter a quest name', '#e03131'); return; }
  var ch = state.children.find(function(c){return c.id===childId;});
  ch.expectedTasks.push({id:'e'+Date.now(), emoji:emoji, name:name});
  save(); render();
}

function addChore(childId) {
  var emoji = document.getElementById('newEmoji').value.trim() || '🧹';
  var name  = document.getElementById('newName').value.trim();
  if (!name) { showMsg('Enter a quest name', '#e03131'); return; }
  var ch = state.children.find(function(c){return c.id===childId;});
  ch.earningChores.push({id:'p'+Date.now(), emoji:emoji, name:name, done:false, lastDone:''});
  save(); render();
}

function deleteChore(childId, choreId) {
  var btn = document.querySelector('[data-cid="'+choreId+'"][data-action="del"]');
  if (btn) {
    if (btn.dataset.armed==='1') { btn.dataset.armed='0'; btn.textContent='🗑️'; }
    else { btn.dataset.armed='1'; btn.textContent='✓?'; setTimeout(function(){if(btn.dataset.armed==='1'){btn.dataset.armed='0';btn.textContent='🗑️';}},2500); return; }
  }
  var ch = state.children.find(function(c){return c.id===childId;});
  ch.earningChores = ch.earningChores.filter(function(c){return c.id!==choreId;});
  save(); render();
}

function saveGoal(childId) {
  var ch  = state.children.find(function(c){return c.id===childId;});
  var name = document.getElementById('goalName_'+childId).value.trim();
  var amt  = parseFloat(document.getElementById('goalAmt_'+childId).value);
  if (!name) { showMsg('Enter a goal name', '#e03131'); return; }
  if (isNaN(amt)||amt<=0) { showMsg('Enter a valid amount', '#e03131'); return; }
  ch.goalName=name; ch.goalTarget=Math.round(amt*100)/100;
  save(); render();
}

// ── MODALS ───────────────────────────────────────────────
function openModal(childId, choreId) {
  var ch    = state.children.find(function(c){return c.id===childId;});
  var chore = ch.earningChores.find(function(c){return c.id===choreId;});
  editingChore = {childId:childId, choreId:choreId};
  document.getElementById('modalEmoji').value = chore.emoji;
  document.getElementById('modalName').value  = chore.name;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingChore=null; }
document.getElementById('modalOverlay').addEventListener('click', function(e){if(e.target===e.currentTarget)closeModal();});
document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
document.getElementById('modalSaveBtn').addEventListener('click', function() {
  if (!editingChore) return;
  var ch    = state.children.find(function(c){return c.id===editingChore.childId;});
  var chore = ch.earningChores.find(function(c){return c.id===editingChore.choreId;});
  var emoji = document.getElementById('modalEmoji').value.trim() || chore.emoji;
  var name  = document.getElementById('modalName').value.trim();
  if (!name) { showMsg('Name required', '#e03131'); return; }
  chore.emoji=emoji; chore.name=name;
  save(); closeModal(); render();
});

function openExpModal(childId, task) {
  editingExpTask = {childId:childId, taskId:task.id};
  document.getElementById('expModalEmoji').value = task.emoji;
  document.getElementById('expModalName').value  = task.name;
  document.getElementById('expModalOverlay').classList.add('open');
}
function closeExpModal() { document.getElementById('expModalOverlay').classList.remove('open'); editingExpTask=null; }
document.getElementById('expModalOverlay').addEventListener('click', function(e){if(e.target===e.currentTarget)closeExpModal();});
document.getElementById('expModalCancelBtn').addEventListener('click', closeExpModal);
document.getElementById('expModalSaveBtn').addEventListener('click', function() {
  if (!editingExpTask) return;
  var ch   = state.children.find(function(c){return c.id===editingExpTask.childId;});
  var task = ch.expectedTasks.find(function(t){return t.id===editingExpTask.taskId;});
  var emoji = document.getElementById('expModalEmoji').value.trim() || task.emoji;
  var name  = document.getElementById('expModalName').value.trim();
  if (!name) { showMsg('Name required', '#e03131'); return; }
  task.emoji=emoji; task.name=name;
  save(); closeExpModal(); render();
});

// ── ANIMATIONS ───────────────────────────────────────────
function spawnCoins(e) {
  var x = (e&&e.clientX)||innerWidth/2, y = (e&&e.clientY)||innerHeight/2;
  for (var i=0;i<7;i++) {
    (function(idx) {
      var el = document.createElement('div');
      el.className = 'coin-particle';
      var a = (Math.PI*2*idx/7)-Math.PI/2, d = 55+Math.random()*50;
      el.style.setProperty('--dx', Math.cos(a)*d+'px');
      el.style.setProperty('--dy', Math.sin(a)*d+'px');
      el.style.left=x+'px'; el.style.top=y+'px';
      document.body.appendChild(el);
      setTimeout(function(){el.remove();},900);
    })(i);
  }
}
var _cf=null;
function launchConfetti() {
  var cv=document.getElementById('confetti-canvas'),ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  var COLS=['#ff6b6b','#ffd43b','#40c057','#ff922b','#339af0','#9775fa','#20c997'],ps=[],f=0;
  for(var i=0;i<120;i++) ps.push({x:Math.random()*cv.width,y:-10-Math.random()*100,w:6+Math.random()*8,h:10+Math.random()*6,color:COLS[Math.floor(Math.random()*COLS.length)],vx:(Math.random()-.5)*3,vy:2+Math.random()*3,rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.2,alpha:1});
  function draw(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.rot+=p.rv;if(f>90)p.alpha=Math.max(0,p.alpha-.015);ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});f++;if(ps.some(function(p){return p.alpha>0;})){ _cf=requestAnimationFrame(draw);}else ctx.clearRect(0,0,cv.width,cv.height);}
  if(_cf)cancelAnimationFrame(_cf);draw();
}
var _ac=null;
function playTick(){
  try{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();var o=_ac.createOscillator(),g=_ac.createGain();o.connect(g);g.connect(_ac.destination);o.type='sine';o.frequency.setValueAtTime(880,_ac.currentTime);o.frequency.exponentialRampToValueAtTime(1200,_ac.currentTime+.1);g.gain.setValueAtTime(.12,_ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,_ac.currentTime+.3);o.start(_ac.currentTime);o.stop(_ac.currentTime+.3);}catch(e){}
}

// ── INIT ─────────────────────────────────────────────────
function initApp() {
  try { state = loadLocal(); } catch(e) { state = freshState(); }
  render();
  document.documentElement.style.setProperty('--child-bg', COLORS[activeIdx].bg);

  // Supabase in background
  try {
    loadSupabaseLib().then(function() {
      try {
        var client = getSb();
        if (!client) return;
        client.from('app_state').select('state').eq('id',1).single().then(function(res) {
          try {
            if (res&&res.data&&res.data.state) {
              var s = typeof res.data.state==='string'?JSON.parse(res.data.state):res.data.state;
              if (s&&s.children) { state=applyResets(s); saveLocal(); render(); }
            }
          } catch(e) {}
          try {
            var channelId = 'cq-' + Math.random().toString(36).slice(2);
            client.channel(channelId).on('postgres_changes',{event:'UPDATE',schema:'public',table:'app_state'},function(p){
              try {
                var s = typeof p.new.state==='string'?JSON.parse(p.new.state):p.new.state;
                if (s&&s.children) { state=applyResets(s); saveLocal(); render(); }
              } catch(e) {}
            }).subscribe();
          } catch(e) {}


        }).catch(function(){});
      } catch(e) {}
    }).catch(function(){});
  } catch(e) {}
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});

// Re-fetch from Supabase when app comes back into focus (iOS suspends WebSockets)
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    try {
      var client = getSb();
      if (!client) return;
      client.from('app_state').select('state').eq('id',1).single().then(function(res) {
        try {
          if (res&&res.data&&res.data.state) {
            var s = typeof res.data.state==='string'?JSON.parse(res.data.state):res.data.state;
            if (s&&s.children) { state=applyResets(s); saveLocal(); render(); }
          }
        } catch(e) {}
      }).catch(function(){});
    } catch(e) {}
  }
});
</script>
